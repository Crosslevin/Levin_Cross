<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic Meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>Contact | Levin Cross</title>
    <meta name="description" content="Contact Levin Cross for questions, feedback, collaborations, and support.">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Header -->
    <header>

        <div class="logo">
            <h1>Levin Cross</h1>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="blog.html">Blog</a>
            <a href="categories.html">Categories</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>

    </header>

    <!-- Contact Section -->
    <section class="hero">

        <h2>Contact Us</h2>

        <p>
            Have a question, suggestion, or business inquiry?
            We'd love to hear from you.
        </p>

        <form id="contactForm">

            <input
                type="text"
                id="name"
                placeholder="Your Name"
                required>

            <br><br>

            <input
                type="email"
                id="email"
                placeholder="Your Email"
                required>

            <br><br>

            <input
                type="text"
                id="subject"
                placeholder="Subject">

            <br><br>

            <textarea
                id="message"
                rows="6"
                placeholder="Your Message"
                required>
            </textarea>

            <br><br>

            <button type="submit">
                📩 Send Message
            </button>

        </form>

    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 Levin Cross. All Rights Reserved.</p>
    </footer>

    <!-- JavaScript -->
    <script src="js/contact.js"></script>

</body>
</html>
