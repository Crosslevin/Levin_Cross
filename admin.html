<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Basic Meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>Admin Dashboard | Levin Cross</title>
    <meta name="description" content="Levin Cross Admin Dashboard">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Header -->
    <header>

        <h1>🔐 Levin Cross Admin Dashboard</h1>

        <button onclick="window.location.href='index.html'">
            🏠 Home
        </button>

    </header>

    <!-- Admin Info -->
    <section class="admin-card">

        <h2>Administrator</h2>

        <div id="adminInfo">
            <p>Loading...</p>
        </div>

    </section>

    <!-- Dashboard Stats -->
    <section class="dashboard-grid">

        <div class="card">
            <h3>Total Blogs</h3>
            <h1 id="totalBlogs">0</h1>
        </div>

        <div class="card">
            <h3>Total Users</h3>
            <h1 id="totalUsers">0</h1>
        </div>

        <div class="card">
            <h3>Status</h3>
            <p id="status">Loading...</p>
        </div>

    </section>

    <!-- Quick Actions -->
    <section>

        <button onclick="window.location.href='index.html#adminPanel'">
            ➕ Publish New Blog
        </button>

        <button onclick="window.location.href='blog.html'">
            📖 View Blogs
        </button>

    </section>

    <!-- JavaScript -->
    <script type="module" src="js/admin.js"></script>

</body>

</html>
